<header class="docs-header">
  <button class="mobile-menu-btn" type="button" aria-label="Open navigation menu" aria-expanded="false">
    <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true"><path d="M2.5 4.5h11M2.5 8h11M2.5 11.5h11"/></svg>
  </button>
  <a href="{{ base_url }}/" class="logo">
    <img src="/hwaro-wide.webp" alt="Hwaro">
  </a>
  <nav>
    <a href="{{ base_url }}/start/"{% if page.section | split(pat="/") | first == "start" %} class="active"{% endif %}>Start</a>
    <a href="{{ base_url }}/writing/"{% if page.section == "writing" %} class="active"{% endif %}>Writing</a>
    <a href="{{ base_url }}/templates/"{% if page.section == "templates" %} class="active"{% endif %}>Templates</a>
    <a href="{{ base_url }}/features/"{% if page.section == "features" %} class="active"{% endif %}>Features</a>
    <a href="{{ base_url }}/deploy/"{% if page.section == "deploy" %} class="active"{% endif %}>Deploy</a>
    <a href="{{ base_url }}/integrations/"{% if page.section == "integrations" %} class="active"{% endif %}>Integrations</a>
  </nav>
  <div class="header-right">
    <button class="search-trigger" type="button" aria-label="Search documentation">
      <svg class="search-trigger-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="7" cy="7" r="4.5"/><path d="m13.5 13.5-3.2-3.2"/></svg>
      <span class="search-trigger-label">Search</span>
      <kbd class="search-trigger-kbd"><span class="search-trigger-mod">⌘</span>K</kbd>
    </button>
    <span class="header-divider" aria-hidden="true"></span>
    <a href="https://examples.hwaro.hahwul.com" class="header-link" target="_blank" rel="noopener">Examples</a>
    <a href="https://github.com/hahwul/hwaro" class="github-link" target="_blank" rel="noopener" aria-label="Hwaro on GitHub">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
    </a>
    <button class="theme-toggle" type="button" data-mode="dark" aria-label="Switch to light theme">
      <svg class="tt-light" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true"><circle cx="8" cy="8" r="3.25"/><path d="M8 1.5v1.5M8 13v1.5M1.5 8H3M13 8h1.5M3.4 3.4l1.06 1.06M11.54 11.54l1.06 1.06M12.6 3.4l-1.06 1.06M4.46 11.54 3.4 12.6"/></svg>
      <svg class="tt-dark" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" aria-hidden="true"><path d="M13.5 9.5A5.5 5.5 0 0 1 6.5 2.5a5.5 5.5 0 1 0 7 7z"/></svg>
    </button>
  </div>
</header>
