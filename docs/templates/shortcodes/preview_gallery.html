<div class="preview-gallery">
{{ body }}
</div>
<style>
.preview-gallery {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1.25rem;
  margin: 1.5rem 0;
}
/* Each preview reads as a tiny browser window: chrome bar with three
   dots, the shot, then a caption strip. Items are links to the
   full-size capture. */
.preview-gallery .preview-item {
  position: relative;
  display: block;
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  text-decoration: none;
  cursor: zoom-in;
  transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
}
.preview-gallery .preview-item::before {
  content: "";
  display: block;
  height: 26px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--hair);
}
.preview-gallery .preview-item::after {
  content: "";
  position: absolute;
  top: 10px;
  left: 12px;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--hair-strong);
  box-shadow: 13px 0 0 var(--hair-strong), 26px 0 0 var(--hair-strong);
}
.preview-gallery .preview-item:hover {
  border-color: var(--border-light);
  box-shadow: var(--glow-ember);
  transform: translateY(-2px);
}
.preview-gallery .preview-item img {
  display: block;
  width: 100%;
  height: auto;
  aspect-ratio: 16 / 10;
  object-fit: cover;
}
.preview-gallery .preview-item .preview-label {
  padding: 0.5rem 0.75rem;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text-secondary);
  border-top: 1px solid var(--hair);
  background: var(--surface-1);
}
.preview-gallery .preview-item .preview-label code {
  font-size: 0.75rem;
  font-family: var(--font-mono);
  color: var(--primary-light);
  background: var(--code-bg);
  border: 1px solid var(--border);
  padding: 0.1rem 0.35rem;
  border-radius: var(--radius-sm);
}
@media (max-width: 600px) {
  .preview-gallery {
    grid-template-columns: 1fr;
  }
}
@media (prefers-reduced-motion: reduce) {
  .preview-gallery .preview-item {
    transition: none;
  }
}
</style>
