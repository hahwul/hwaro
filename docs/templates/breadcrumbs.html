<nav class="breadcrumbs" aria-label="Breadcrumb">
  <ol>
    <li><a href="{{ base_url }}/">Home</a></li>
    {% for a in page.ancestors %}{% if a.url != page.url %}
    <li><a href="{{ base_url }}{{ a.url }}">{{ a.title }}</a></li>
    {% endif %}{% endfor %}
    <li aria-current="page">{{ page.title }}</li>
  </ol>
</nav>
