---
name: Build and Release Binaries
on:
  workflow_dispatch:
  release:
    types: [published]
permissions:
  contents: write
jobs:
  build:
    name: Build Binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: ubuntu-24.04-arm
            platform: linux
          - os: macos-latest
            platform: macos
          - os: macos-15-intel
            platform: macos
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1
      - name: Checkout source code
        uses: actions/checkout@v6
      - name: Install dependencies
        run: shards install
      - name: Inject slug/short variables
        uses: rlespinasse/github-slug-action@v5
      - name: Set architecture environment variable
        run: |
          if [ "$RUNNER_ARCH" == "X64" ]; then
            echo "ARCH=x86_64" >> $GITHUB_ENV
          elif [ "$RUNNER_ARCH" == "ARM64" ]; then
            echo "ARCH=arm64" >> $GITHUB_ENV
          else
            echo "ARCH=unknown" >> $GITHUB_ENV
          fi
      - if: matrix.platform == 'linux'
        name: Build binary (Linux)
        run: |
          mkdir -p build
          # Use Alpine/musl-based Crystal container for proper static binary.
          # `-Dpreview_mt` enables Crystal's multi-threaded runtime; without
          # it, `hwaro build` runs all fibers on a single OS thread and big
          # sites are bottlenecked on one core.
          docker run --rm -v $(pwd):/hwaro -w /hwaro --entrypoint="" crystallang/crystal:1.20.0-alpine sh -c "
            apk add --no-cache yaml-dev git curl &&
            shards install --release --no-debug --production &&
            mkdir -p build &&
            crystal build src/main.cr -o build/hwaro-${GITHUB_REF_SLUG}-linux-${ARCH} --release --no-debug --static -Dpreview_mt
          "
      - if: matrix.platform == 'macos'
        name: Build binary (macOS)
        run: |
          mkdir -p build
          # Link against current OpenSSL (openssl@3). Without pinning PKG_CONFIG_PATH
          # the build can pick up an EOL openssl@1.1, producing a binary that won't
          # launch on a clean machine (dyld: libssl.1.1.dylib not found).
          brew install openssl@3
          export PKG_CONFIG_PATH="$(brew --prefix openssl@3)/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          BIN="build/hwaro-${GITHUB_REF_SLUG}-osx-${ARCH}"
          crystal build src/main.cr \
            -o "$BIN" \
            --no-debug --release \
            -Dpreview_mt
          echo "== otool -L $BIN ==" && otool -L "$BIN"
          # Guard 1: never ship a macOS binary linked against EOL openssl@1.1.
          if otool -L "$BIN" | grep -q 'openssl@1.1'; then
            echo "::error::macOS binary still links EOL openssl@1.1"; exit 1
          fi
          # Guard 2: openssl@3 must be the ONLY Homebrew dynamic dep. Anything else
          # means the Homebrew formula's depends_on list is out of date.
          EXTRA="$(otool -L "$BIN" \
            | grep -oE '/(opt/homebrew|usr/local)/(opt|Cellar)/[^/]+' \
            | grep -v 'openssl@3' | sort -u || true)"
          if [ -n "$EXTRA" ]; then
            echo "::error::unexpected non-openssl@3 Homebrew deps (update formula depends_on):"
            echo "$EXTRA"; exit 1
          fi
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: build-${{ matrix.os }}-${{ env.ARCH }}
          path: build
      - if: startsWith(github.ref, 'refs/tags/')
        name: Upload to GitHub Releases
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true
          file: build/*
