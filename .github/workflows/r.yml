name: Cleanup old GHCR tags

on:
  schedule:
    - cron: '0 0 * * 0'   # 매주 일요일 자정
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Delete sha-* and old untagged versions
      - name: Delete sha-* tagged images
        uses: snok/container-retention-policy@v3
        with:
          account: user                          
          token: ${{ secrets.GITHUB_TOKEN }}
          image-names: hwaro
          cut-off: 1s                            
          image-tags: "sha-*"                   
          tag-selection: tagged
          dry-run: true                         
      - name: 🗑️ Delete untagged images
        uses: snok/container-retention-policy@v3.0.1
        with:
          account: user
          token: ${{ secrets.GITHUB_TOKEN }}
          image-names: hwaro
          tag-selection: untagged       
          cut-off: 1s
          dry-run: true                   
