---
name: Homebrew tap Publish
# Manual-only: publish the prebuilt formula to the Homebrew tap on demand.
# The release binaries must already exist on the GitHub release for the given
# version. Trigger this after "Build and Release Binaries" has finished.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.17.0)"
        required: true
        type: string
permissions:
  contents: read
jobs:
  publish-formula:
    name: Publish prebuilt formula to tap
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        id: ver
        # Pass event data via env (never interpolate ${{ }} straight into the
        # script body) so a crafted input can't inject shell.
        env:
          DISPATCH_VERSION: ${{ github.event.inputs.version }}
        run: |
          # Strip a leading 'v' if present.
          VERSION="${DISPATCH_VERSION#v}"
          if [ -z "$VERSION" ]; then
            echo "::error::version input is empty"; exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Checkout source (formula template)
        # Use the template from the branch this workflow runs on (not the release
        # tag): the template is build tooling and must reflect the current release
        # asset layout, while the `version` input drives which binaries to fetch.
        uses: actions/checkout@v6

      - name: Download release binaries and compute checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          V: ${{ steps.ver.outputs.version }}
        run: |
          # macOS assets are self-contained .tar.gz bundles (binary + bundled
          # dylibs, see scripts/package-macos.sh); Linux assets are bare static
          # musl binaries. Homebrew downloads and checksums exactly these files,
          # so compute sha256 over the same artifact it will fetch.
          for asset in \
            "hwaro-v$V-osx-arm64.tar.gz" \
            "hwaro-v$V-osx-x86_64.tar.gz" \
            "hwaro-v$V-linux-arm64" \
            "hwaro-v$V-linux-x86_64"; do
            gh release download "v$V" --repo hahwul/hwaro \
              --pattern "$asset" --output "$asset"
          done
          {
            echo "SHA_OSX_ARM64=$(sha256sum "hwaro-v$V-osx-arm64.tar.gz" | awk '{print $1}')"
            echo "SHA_OSX_X86_64=$(sha256sum "hwaro-v$V-osx-x86_64.tar.gz" | awk '{print $1}')"
            echo "SHA_LINUX_ARM64=$(sha256sum "hwaro-v$V-linux-arm64" | awk '{print $1}')"
            echo "SHA_LINUX_X86_64=$(sha256sum "hwaro-v$V-linux-x86_64" | awk '{print $1}')"
          } >> "$GITHUB_ENV"

      - name: Render formula
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p out
          sed \
            -e "s|__VERSION__|$V|g" \
            -e "s|__SHA_OSX_ARM64__|$SHA_OSX_ARM64|g" \
            -e "s|__SHA_OSX_X86_64__|$SHA_OSX_X86_64|g" \
            -e "s|__SHA_LINUX_ARM64__|$SHA_LINUX_ARM64|g" \
            -e "s|__SHA_LINUX_X86_64__|$SHA_LINUX_X86_64|g" \
            .github/homebrew/hwaro.rb.tmpl > out/hwaro.rb
          echo "----- rendered formula -----"
          cat out/hwaro.rb

      - name: Checkout Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: hahwul/homebrew-hwaro
          token: ${{ secrets.HWARO_PUBLISH_TOKEN }}
          path: tap

      - name: Commit and push formula
        env:
          V: ${{ steps.ver.outputs.version }}
        run: |
          mkdir -p tap/Formula
          cp out/hwaro.rb tap/Formula/hwaro.rb
          cd tap
          git config user.name "hahwul"
          git config user.email "hahwul@gmail.com"
          git add Formula/hwaro.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged; nothing to publish."
            exit 0
          fi
          git commit -m "hwaro $V"
          git push
