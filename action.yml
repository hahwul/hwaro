name: "Hwaro Deploy to Pages"
description: "Build and deploy a Hwaro static site to GitHub Pages"
author: "HAHWUL"

branding:
  icon: "octagon"
  color: "white"

inputs:
  pages_branch:
    description: "The git branch to deploy to"
    required: false
    default: "gh-pages"
  build_dir:
    description: "Directory where the Hwaro site source is located"
    required: false
    default: "."
  output_dir:
    description: "Output directory for the built site"
    required: false
    default: "public"
  build_flags:
    description: "Additional flags to pass to hwaro build command"
    required: false
    default: ""
  build_only:
    description: "Set to true to only build without deploying"
    required: false
    default: "false"
  repository:
    description: "Target repository to deploy to (default: current repository)"
    required: false
    default: ""
  github_hostname:
    description: "GitHub hostname (for GitHub Enterprise)"
    required: false
    default: "github.com"
  token:
    description: "GitHub token for deployment. Defaults to the workflow token when deploying; intentionally empty for build_only runs so it is not exposed to user build hooks. Pass an explicit value to override."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Resolve Hwaro image tag
      id: resolve
      shell: bash
      run: |
        REF="${{ github.action_ref }}"
        # Strip leading 'v' prefix (v0.1.0 -> 0.1.0, main -> main)
        TAG="${REF#v}"
        # Fallback to 'latest' if the ref is empty
        TAG="${TAG:-latest}"
        echo "image=ghcr.io/hahwul/hwaro:${TAG}" >> "$GITHUB_OUTPUT"
        echo "Using Hwaro image: ghcr.io/hahwul/hwaro:${TAG}"

    - name: Resolve deploy token
      id: token
      shell: bash
      env:
        BUILD_ONLY: ${{ inputs.build_only }}
        INPUT_TOKEN: ${{ inputs.token }}
        WORKFLOW_TOKEN: ${{ github.token }}
      run: |
        # Only fall back to the workflow token when actually deploying.
        # build_only runs receive no token by default so the value cannot
        # be exfiltrated by user-controlled build hooks. See issue #550.
        if [[ -n "$INPUT_TOKEN" ]]; then
          TOKEN="$INPUT_TOKEN"
        elif [[ "$BUILD_ONLY" != "true" ]]; then
          TOKEN="$WORKFLOW_TOKEN"
        else
          TOKEN=""
        fi
        echo "::add-mask::$TOKEN"
        echo "value=$TOKEN" >> "$GITHUB_OUTPUT"

    - name: Run Hwaro
      shell: bash
      run: |
        docker run --rm \
          -v "${{ github.workspace }}":"/github/workspace" \
          -w /github/workspace \
          -e GITHUB_ACTIONS=true \
          -e GITHUB_REPOSITORY="${{ github.repository }}" \
          -e GITHUB_ACTOR="${{ github.actor }}" \
          -e PAGES_BRANCH="${{ inputs.pages_branch }}" \
          -e BUILD_DIR="${{ inputs.build_dir }}" \
          -e OUT_DIR="${{ inputs.output_dir }}" \
          -e BUILD_FLAGS="${{ inputs.build_flags }}" \
          -e BUILD_ONLY="${{ inputs.build_only }}" \
          -e REPOSITORY="${{ inputs.repository }}" \
          -e GITHUB_HOSTNAME="${{ inputs.github_hostname }}" \
          -e INPUT_TOKEN="${{ steps.token.outputs.value }}" \
          "${{ steps.resolve.outputs.image }}"
