name: "Hwaro Deploy to Pages"
description: "Build and deploy a Hwaro static site to GitHub Pages"
author: "HAHWUL"

branding:
  icon: "octagon"
  color: "white"

inputs:
  pages_branch:
    description: "The git branch to deploy to"
    required: false
    default: "gh-pages"
  build_dir:
    description: "Directory where the Hwaro site source is located"
    required: false
    default: "."
  output_dir:
    description: "Output directory for the built site"
    required: false
    default: "public"
  build_flags:
    description: "Additional flags to pass to hwaro build command"
    required: false
    default: ""
  build_only:
    description: "Set to true to only build without deploying"
    required: false
    default: "false"
  repository:
    description: "Target repository to deploy to (default: current repository)"
    required: false
    default: ""
  github_hostname:
    description: "GitHub hostname (for GitHub Enterprise)"
    required: false
    default: "github.com"
  token:
    description: "GitHub token for deployment (defaults to GITHUB_TOKEN)"
    required: false
    default: ${{ github.token }}

runs:
  using: "composite"
  steps:
    - name: Resolve Hwaro image tag
      id: resolve
      shell: bash
      run: |
        REF="${{ github.action_ref }}"
        # Strip leading 'v' prefix (v0.1.0 -> 0.1.0, main -> main)
        TAG="${REF#v}"
        echo "image=ghcr.io/hahwul/hwaro:${TAG}" >> "$GITHUB_OUTPUT"
        echo "Using Hwaro image: ghcr.io/hahwul/hwaro:${TAG}"

    - name: Run Hwaro
      shell: bash
      run: |
        docker run --rm \
          -v "${{ github.workspace }}":"/github/workspace" \
          -w /github/workspace \
          -e GITHUB_ACTIONS=true \
          -e GITHUB_REPOSITORY="${{ github.repository }}" \
          -e GITHUB_ACTOR="${{ github.actor }}" \
          -e PAGES_BRANCH="${{ inputs.pages_branch }}" \
          -e BUILD_DIR="${{ inputs.build_dir }}" \
          -e OUT_DIR="${{ inputs.output_dir }}" \
          -e BUILD_FLAGS="${{ inputs.build_flags }}" \
          -e BUILD_ONLY="${{ inputs.build_only }}" \
          -e REPOSITORY="${{ inputs.repository }}" \
          -e GITHUB_HOSTNAME="${{ inputs.github_hostname }}" \
          -e INPUT_TOKEN="${{ inputs.token }}" \
          "${{ steps.resolve.outputs.image }}"
